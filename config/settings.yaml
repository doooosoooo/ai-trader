system:
  mode: live
  timezone: Asia/Seoul
  log_level: INFO
  db_path: data/storage/trader.db
schedule:
  data_collection_interval: 3
  llm_analysis_interval: 12
  news_check_interval: 30
  market_open: 09:00
  market_close: '15:30'
ml:
  training_mode: batch
  retrain_schedule: daily
  models:
    price_direction: true
    market_regime: true
    anomaly_detection: true
  lookback_days: 120
  feature_window: 20
llm:
  model: claude-sonnet-4-6        # Stage 1 Triage — Sonnet
  model_deep: claude-sonnet-4-6   # Stage 2 Deep analysis — Sonnet (Opus는 daily_review/RCA/weekly_refine 전용)
  max_tokens: 4096
  temperature: 0.3
  # 카테고리별 일일 한도 (USD) — 한 기능 폭주가 다른 기능 차단 못 하도록 분리
  cost_limits_daily_usd:
    trading: 10.0                 # 평상시 트레이딩 (Stage1+Stage2 둘 다 Sonnet, 일 평균 $1~2)
    daily_review: 1.0             # 장 마감 후 Opus 1회 심층 복기
    weekly_review: 15.0           # 주 1회 Opus 전략 검토 (1M context)
    rca: 5.0                      # 사고 발생 시 Opus RCA (이벤트 트리거)
    news: 5.0                     # 뉴스/공시 심층 (선택, 비활성)
  cost_limit_daily_usd: 10.0      # backward compat — trading 카테고리와 동일
  max_retries: 3
  timeout_seconds: 30
broker:
  provider: kis
  account_type: real
  base_url_virtual: https://openapivts.koreainvestment.com:29443
  base_url_real: https://openapi.koreainvestment.com:9443
  ws_url_virtual: ws://ops.koreainvestment.com:31000
  ws_url_real: ws://ops.koreainvestment.com:21000
telegram:
  enabled: true
  alert_levels:
  - trade_executed
  - signal_generated
  - llm_analysis
  - circuit_breaker
  - daily_report
  - confirmation_required
  - strategy_suggestion
  - screening_result
  - error
  - risk_exit
  - concentration_alert
  - drawdown_alert
  - backtest_result
  - unfilled_order
  confirmation_timeout_seconds: 300
