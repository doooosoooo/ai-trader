# AI Optimizer — 파라미터 최적화 설정
# ai-optimizer 프로세스가 사용하는 전용 설정 파일

schedule:
  interval_minutes: 30           # 최적화 반복 간격 (분)
  db_refresh_before_run: true    # 실행 전 DB 스냅샷 갱신

optimization:
  default_capital: 100_000    # 백테스트 초기 자본 (현재 자산 수준)
  default_start: "20210101"      # 기본 시작일 (5년치)
  sort_by: "sharpe_ratio"        # 정렬 기준 (sharpe_ratio, total_return)
  max_workers: 1                 # 동시 실행 수 (CPU 보호)

  # 제안 알림 기준 (이 이상 개선되어야 알림)
  thresholds:
    min_sharpe_improvement: 0.2
    min_return_improvement: 0.03  # 3%p 이상
    max_overfit_ratio: 3.0        # 과적합 비율 상한
    min_test_return: 0.0          # 테스트 기간 수익률 > 0

# 파라미터 탐색 그리드 (항상 넓은 그리드 사용)
grids:
  swing:
    rsi_oversold: [25, 30, 35, 40, 45]
    take_profit_pct: [0.05, 0.08, 0.10, 0.15, 0.20, 0.25]
    stop_loss_pct: [0.02, 0.03, 0.05, 0.07]
    position_size_pct: [0.05, 0.08, 0.10, 0.13]
    max_hold_days: [7, 14, 21, 30]

  daytrading:
    take_profit_pct: [0.02, 0.03, 0.04, 0.06, 0.08]
    stop_loss_pct: [0.01, 0.015, 0.02, 0.03]
    volume_surge_multiplier: [1.2, 1.5, 2.0, 3.0]
    position_size_pct: [0.03, 0.05, 0.08, 0.10]
    max_hold_days: [1, 2, 3, 5]

# 대상 종목: DB에서 데이터가 충분한(200봉 이상) 전체 종목 자동 사용
